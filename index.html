function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function today(){return new Date().toISOString().slice(0,10)}
function dIM(y,m){return new Date(y,m+1,0).getDate()}
function isWE(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fv(id){return parseFloat(document.getElementById(id)?.value)||0}
function gv(id){return document.getElementById(id)?.value||''}
function oM(id){document.getElementById(id).classList.add('open')}

function anaStatus(v,t){const n=parseFloat(v);if(isNaN(n))return'none';if(n<t.min||n>t.max)return'err';const r=t.max-t.min;if(n<t.min+r*.1||n>t.max-r*.1)return'warn';return'ok'}
function hasRefs(type,id){const ana=gAna(),bd=gBD(),s=gS();const amd=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.match(/^galv_\d{4}_\d+$/))try{amd.push(JSON.parse(localStorage.getItem(k)))}catch{}}if(type==='eq'){if(ana.some(a=>a.vatId===id))return'аналізах';if(bd.some(b=>b.eqId===id))return'поломках';for(const md of amd)for(const d of Object.values(md))if(d?.chemRows?.some(r=>r.vatId===id))return'днях'}if(type==='prod'){for(const md of amd)for(const d of Object.values(md))if(d?.prodRows?.some(r=>r.prodId===id))return'днях';if(gQueue().some(q=>q.prodId===id))return'черзі'}if(type==='chem'){for(const md of amd)for(const d of Object.values(md))if(d?.chemRows?.some(r=>r.chemId===id))return'днях'}if(type==='anaType'){if(ana.some(a=>a.typeId===id))return'аналізах'}return false}
function collectDays(from,to){const dF=new Date(from),dT=new Date(to),all=[];let c=new Date(dF);while(c<=dT){const y=c.getFullYear(),m=c.getMonth(),d=c.getDate(),md=gMD(y,m),dd=md[d];if(dd&&!dd.weekend)all.push({...dd,date:dStr(y,m,d)});c.setDate(c.getDate()+1)}return all}

// ===== DAYS =====
function renderDays(){
  const f=new Date(gFrom),t=new Date(gTo),y=f.getFullYear(),m=f.getMonth();
  if(!(f.getDate()===1&&t.getDate()===dIM(y,m)&&t.getMonth()===m)){document.getElementById('pg-days').innerHTML=`<div class="abox aw">Календар — тільки повний місяць.</div>`;return}
  const s=gS(),data=gMD(y,m),days=dIM(y,m),ana=gAna(),queue=gQueue();
  let totKg=0,totCost=0,wD=0;
  for(let d=1;d<=days;d++){const dd=data[d];if(!dd||dd.weekend)continue;wD++;totKg+=(dd.wz||0)+(dd.bz||0);totCost+=dd.totalCost||0}
  const seb=totKg>0?(totCost/totKg).toFixed(2):0;
  const firstDow=new Date(y,m,1).getDay(),startOff=(firstDow===0)?6:firstDow-1;
  let cells='';
  for(let i=0;i<startOff;i++)cells+=`<div class="dc empty"></div>`;
  for(let d=1;d<=days;d++){
    const dd=data[d]||{},dow=new Date(y,m,d).getDay(),ds=dStr(y,m,d);
    const wknd=dd.weekend!==undefined?dd.weekend:isWE(y,m,d);
    const hasData=dd.wz||dd.bz||dd.chemTotal;
    const dayAna=ana.filter(a=>a.date===ds);
    const dayQ=queue.filter(q=>q.deadline>=ds);
    let inner=`<div style="display:flex;justify-content:space-between"><span class="dn">${d}</span><span style="font-size:9px;color:#aaa">${DW[dow]}</span></div>`;
    if(hasData){
      const kg=(dd.wz||0)+(dd.bz||0);
      if(kg)inner+=`<div class="dc-info"><b>${kg}кг</b> · ${dd.seb||0}₴/кг</div>`;
      if(dd.chemTotal)inner+=`<div class="dc-info">💊 <b>${Math.round(dd.chemTotal)}</b>₴</div>`;
    }else if(wknd)inner+=`<div class="dc-info" style="color:#c0392b">Вихідний</div>`;
    else inner+=`<div class="dc-info" style="color:#bbb">—</div>`;
    if(dayAna.length){let e=0,w=0;dayAna.forEach(a=>{const at=s.anaTypes.find(t=>t.id===a.typeId);if(!at)return;const st=anaStatus(a.value,at);if(st==='err')e++;else if(st==='warn')w++});inner+=`<div class="dc-info">🔬${dayAna.length}${e?` <span style="color:#e74c3c">❌${e}</span>`:''}${w?` <span style="color:#e67e22">⚠${w}</span>`:''}</div>`}
    if(gBD().some(b=>b.date===ds))inner+=`<div class="dc-info" style="color:#e74c3c">🔧</div>`;
    cells+=`<div class="dc${wknd?' we':''}${hasData?' hd':''}" onclick="openDay(${d})">${inner}</div>`
  }
  const lastDow=new Date(y,m,days).getDay(),endOff=(lastDow===0)?0:7-lastDow;
  for(let i=0;i<endOff;i++)cells+=`<div class="dc empty"></div>`;
  document.getElementById('pg-days').innerHTML=`<div style="display:flex;gap:7px;margin-bottom:9px"><button class="btn bp" onclick="openEEModal()">⚡ ЕЕ/Вода</button></div><div class="krow"><div class="kpi"><div class="kpi-l">Покрито</div><div class="kpi-v">${totKg} кг</div><div class="kpi-s">${wD} дн.</div></div><div class="kpi"><div class="kpi-l">Собівартість</div><div class="kpi-v">${seb} ₴/кг</div></div><div class="kpi"><div class="kpi-l">Витрати</div><div class="kpi-v">${Math.round(totCost).toLocaleString('uk')} ₴</div></div></div><div class="cal-grid">${['Пн','Вт','Ср','Чт','Пт'].map(n=>`<div class="cal-hdr">${n}</div>`).join('')}${['Сб','Нд'].map(n=>`<div class="cal-hdr we">${n}</div>`).join('')}${cells}</div>`
}

let _pri=0,_cri=0,_selP={},_queueOnly=true;
function openDay(d){
  curDay=d;_selP={};_queueOnly=true;
  const y=getCY(),m=getCM(),s=gS(),data=gMD(y,m),dd=data[d]||{},ds=dStr(y,m,d);
  const wknd=dd.weekend!==undefined?dd.weekend:isWE(y,m,d);
  const dayAna=gAna().filter(a=>a.date===ds);
  const dayQC=gQC().filter(q=>q.date===ds);
  // Queue: items with deadline >= this date (not expired)
  const activeQ=gQueue().filter(q=>q.deadline>=ds);
  document.getElementById('mDayT').textContent=`${d} ${MN[m]} ${y} (${DW[new Date(y,m,d).getDay()]})`;
  _pri=0;_cri=0;
  const sP=dd.prodRows||[],sC=dd.chemRows||[];
  let pH=sP.map((r,i)=>{_pri=i+1;return bPR(i,r,s,ds)}).join('');
  let cH=sC.map((r,i)=>{_cri=i+1;return bCR(i,r,s)}).join('');
  sP.forEach((r,i)=>{if(r.prodId)_selP[i]=r.prodId});

  // Queue display
  let qH='';
  if(activeQ.length){
    qH=`<div class="sec"><div class="st">📋 Черга (дедлайн ≥ ${ds})</div><table class="prtbl"><thead><tr><th>Виріб</th><th class="r">Замовл.кг</th><th>Дедлайн</th><th>Прим.</th></tr></thead><tbody>`;
    activeQ.forEach(q=>{const p=s.products.find(x=>x.id===q.prodId);qH+=`<tr><td>${p?p.name:'—'}</td><td class="r">${q.kg}</td><td>${q.deadline}</td><td style="font-size:11px">${q.notes||''}</td></tr>`});
    qH+=`</tbody></table></div>`;
  }

  // Analyses
  let anaH='';
  if(dayAna.length){
    anaH=`<div class="sec"><div class="st">🔬 Аналізи (${dayAna.length})</div>`;
    dayAna.forEach(a=>{const at=s.anaTypes.find(t=>t.id===a.typeId);if(!at)return;const st=anaStatus(a.value,at);const eq=a.vatId?s.equipment.find(e=>e.id===a.vatId)?.name||'':'';anaH+=`<div style="font-size:12px;margin-bottom:3px"><span class="badge ${st==='ok'?'bok':st==='warn'?'bwn':'berr'}">${a.value} ${at.unit}</span> ${at.name}${eq?' · '+eq:''}</div>`});
    anaH+=`</div>`;
  }

  document.getElementById('mDayB').innerHTML=`
    ${qH}${anaH}
    <div style="display:flex;gap:5px;margin-bottom:10px"><button class="btn bp bsm" onclick="cM('mDay');openAnaModal(null,null,null,'${ds}')">+ Аналіз</button></div>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><input type="checkbox" id="isWE" ${wknd?'checked':''} onchange="document.getElementById('wf').style.display=this.checked?'none':''"><label for="isWE" style="font-size:13px;color:#c0392b;font-weight:600">Вихідний / Простій</label></div>
    <div id="wf" ${wknd?'style="display:none"':''}>
      <div class="sec"><div class="st">Час</div><div class="fg g4"><div><label>Початок</label><input type="time" id="tStart" value="${dd.tStart||''}"></div><div><label>Кінець</label><input type="time" id="tEnd" value="${dd.tEnd||''}"></div><div><label>Оператор</label><input type="text" id="operator" value="${dd.operator||''}"></div><div><label>Примітка</label><input type="text" id="dayNote" value="${dd.notes||''}"></div></div></div>
      <div class="sec"><div class="st">Вироби</div>
        <div class="chk-row"><input type="checkbox" id="chkQOnly" ${_queueOnly?'checked':''} onchange="_queueOnly=this.checked"><label for="chkQOnly" style="font-size:12px;color:#8e44ad;font-weight:600">Тільки з черги</label></div>
        <table class="prtbl"><thead><tr><th style="width:30%">Виріб</th><th>Бар.</th><th>кг</th><th>Тип</th><th>Прим.</th><th></th><th></th></tr></thead><tbody id="prBody">${pH}</tbody></table>
        <button class="btn bsuc bsm" onclick="addPR()">+ Виріб</button>
        <div style="margin-top:5px;font-size:13px;color:#1a3a5c"><b>Загалом: <span id="totKg">—</span> кг</b></div>
      </div>
      <div class="sec"><div class="st">Хімія</div><table class="chtbl"><thead><tr><th style="width:30%">Хімікат</th><th style="width:20%">Ванна</th><th>Ціна</th><th>К-ть</th><th>Сума</th><th></th></tr></thead><tbody id="chBody">${cH}</tbody></table><button class="btn bsuc bsm" onclick="addCR()">+ Хімія</button><div style="margin-top:5px;font-size:13px">Разом: <b id="chemTot" style="color:#c0392b">—</b> ₴</div></div>
      <div class="sec"><div class="st">ЕЕ, Вода, ЗП</div><div class="fg g4"><div><label>ЕЕ кВт·год</label><input type="number" id="eeKwh" value="${dd.eeKwh||''}" oninput="calcEE()"></div><div><label>Тариф ЕЕ</label><input type="number" id="eeRate" step="0.01" value="${dd.eeRate!==undefined?dd.eeRate:s.eeRate}" oninput="calcEE()"></div><div><label>Вода м³</label><input type="number" id="wtr" value="${dd.water||''}" oninput="calcEE()"></div><div><label>Тариф вода</label><input type="number" id="wtrRate" step="0.01" value="${dd.waterRate||s.waterRate}" oninput="calcEE()"></div></div><div style="font-size:12px;color:#555" id="eeDisp"></div><div class="fg g2" style="margin-top:7px"><div><label>ЗП</label><input type="number" id="wage" value="${dd.wage||''}"></div><div><label>Інші</label><input type="number" id="other" value="${dd.other||''}"></div></div></div>
    </div>`;
  oM('mDay');calcPT();calcCT();calcEE();
}
function getQueueProdIds(){const ds=dStr(getCY(),getCM(),curDay);return gQueue().filter(q=>q.deadline>=ds).map(q=>q.prodId)}
function bPR(i,r,s,ds){
  const nm=r?.prodId?(s.products.find(p=>p.id===r.prodId)||{}).name||'':'';
  return`<tr id="pr_${i}"><td><div class="srchbox"><input type="text" id="ps_${i}" placeholder="Пошук..." value="${nm}" oninput="fProd(${i})" onfocus="sPD(${i})" autocomplete="off"><div class="sdrop" id="pd_${i}"></div></div></td><td><input type="number" id="pdr_${i}" min="1" value="${r?r.drums:1}" style="width:42px" oninput="oPC(${i})"></td><td><input type="number" id="pkg_${i}" step="0.1" value="${r?r.kg:''}" style="width:50px" oninput="calcPT()"></td><td><select id="pt_${i}" style="font-size:11px;width:65px"><option value="coat" ${!r||!r.recoat?'selected':''}>Покр.</option><option value="recoat" ${r?.recoat?'selected':''}>Перепокр.</option></select></td><td><input type="text" id="pn_${i}" value="${r?.notes||''}" style="font-size:11px;width:55px"></td><td><button class="btn bsuc bsm" title="Контроль якості" onclick="openQCForProd(${i})">✅</button></td><td><button class="btn bd2 bsm" onclick="document.getElementById('pr_${i}').remove();calcPT()">✕</button></td></tr>`}
function bCR(i,r,s){const co=s.chem.map(c=>`<option value="${c.id}" ${r?.chemId===c.id?'selected':''}>${c.name}</option>`).join('');const eo=['<option value="">—</option>',...s.equipment.map(e=>`<option value="${e.id}" ${r?.vatId===e.id?'selected':''}>${e.name}</option>`)].join('');return`<tr id="cr_${i}"><td><select id="cc_${i}" style="font-size:11px" onchange="oCCh(${i})">${co}</select></td><td><select id="cv_${i}" style="font-size:11px">${eo}</select></td><td><input type="number" id="cp_${i}" step="0.01" value="${r?r.price:''}" style="width:58px" oninput="calcCT()"></td><td><input type="number" id="cq_${i}" step="0.01" value="${r?r.qty:''}" style="width:52px" oninput="calcCT()"></td><td style="font-weight:700;color:#c0392b;font-size:11px" id="cs_${i}"></td><td><button class="btn bd2 bsm" onclick="document.getElementById('cr_${i}').remove();calcCT()">✕</button></td></tr>`}
function addPR(){const i=_pri++;document.getElementById('prBody').insertAdjacentHTML('beforeend',bPR(i,null,gS(),dStr(getCY(),getCM(),curDay)))}
function addCR(){const i=_cri++;document.getElementById('chBody').insertAdjacentHTML('beforeend',bCR(i,null,gS()))}
function sPD(i){const s=gS(),d=document.getElementById('pd_'+i);if(!d)return;const qIds=_queueOnly?getQueueProdIds():null;const prods=qIds?s.products.filter(p=>qIds.includes(p.id)):s.products;d.innerHTML=prods.map(p=>`<div class="sitem" onclick="selP(${i},'${p.id}')">${p.name}</div>`).join('');d.classList.add('open')}
function fProd(i){const s=gS(),q=gv('ps_'+i).toLowerCase(),d=document.getElementById('pd_'+i);if(!d)return;const qIds=_queueOnly?getQueueProdIds():null;let prods=s.products;if(qIds)prods=prods.filter(p=>qIds.includes(p.id));d.innerHTML=prods.filter(p=>p.name.toLowerCase().includes(q)).map(p=>`<div class="sitem" onclick="selP(${i},'${p.id}')">${p.name}</div>`).join('');d.classList.add('open')}
function selP(i,pid){const s=gS(),p=s.products.find(x=>x.id===pid);_selP[i]=pid;const inp=document.getElementById('ps_'+i);if(inp&&p)inp.value=p.name;document.getElementById('pd_'+i)?.classList.remove('open');oPC(i)}
function oPC(i){const s=gS(),p=s.products.find(x=>x.id===_selP[i]);if(!p?.drumLoad)return;const el=document.getElementById('pkg_'+i);if(el)el.value=(p.drumLoad*(fv('pdr_'+i)||1)).toFixed(1);calcPT()}
document.addEventListener('click',e=>{if(!e.target.closest('.srchbox'))document.querySelectorAll('.sdrop').forEach(d=>d.classList.remove('open'))});

function renderQueue(){
  const s=gS(),q=gQueue().sort((a,b)=>a.deadline.localeCompare(b.deadline)),allDays=collectDays(gFrom,gTo);
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="font-size:14px;color:#1a3a5c">📋 Черга</h3><button class="btn bp" onclick="openQueueModal(null)">+ Замовлення</button></div>`;
  html+=`<table class="tbl"><thead><tr><th>Виріб</th><th class="r">Замовл.кг</th><th>Дедлайн</th><th class="r">Факт кг</th><th>Різниця</th><th>Прим.</th><th></th></tr></thead><tbody>`;

  });
  html+=`</tbody></table>`;document.getElementById('pg-queue').innerHTML=html}

function renderSummary(){
  const s=gS(),allDays=collectDays(gFrom,gTo),pays=gPay().filter(p=>p.date>=gFrom&&p.date<=gTo),ana=gAna();
  let tWz=0,tBz=0,tWg=0,tEe=0,tWtr=0,tChem=0,tOth=0,tCost=0;const prodAgg={},chemAgg={},chemByVat={};
  allDays.forEach(dd=>{tWz+=dd.wz||0;tBz+=dd.bz||0;tWg+=dd.wage||0;tEe+=dd.eeCost||0;tWtr+=dd.waterCost||0;tChem+=dd.chemTotal||0;tOth+=dd.other||0;tCost+=dd.totalCost||0;(dd.prodRows||[]).forEach(r=>{if(!r.prodId||!r.kg)return;if(!prodAgg[r.prodId])prodAgg[r.prodId]={kg:0,rkg:0,dr:0};if(r.recoat)prodAgg[r.prodId].rkg+=r.kg;else prodAgg[r.prodId].kg+=r.kg;prodAgg[r.prodId].dr+=(r.drums||1)});(dd.chemRows||[]).forEach(r=>{if(!r.qty)return;if(!chemAgg[r.chemId])chemAgg[r.chemId]={qty:0,sum:0};chemAgg[r.chemId].qty+=r.qty;chemAgg[r.chemId].sum+=r.qty*r.price;const vk=r.vatId||'_';if(!chemByVat[vk])chemByVat[vk]={};if(!chemByVat[vk][r.chemId])chemByVat[vk][r.chemId]={qty:0,sum:0};chemByVat[vk][r.chemId].qty+=r.qty;chemByVat[vk][r.chemId].sum+=r.qty*r.price})});
  const tKg=tWz+tBz,avgS=tKg>0?(tCost/tKg).toFixed(2):0,tPay=pays.reduce((a,p)=>a+(parseFloat(p.amount)||0),0);

  let h=`<div class="krow"><div class="kpi"><div class="kpi-l">Покрито</div><div class="kpi-v">${tKg}кг</div><div class="kpi-s">${allDays.length}дн.</div></div><div class="kpi"><div class="kpi-l">Білий</div><div class="kpi-v">${tWz}</div></div><div class="kpi"><div class="kpi-l">Чорний</div><div class="kpi-v">${tBz}</div></div><div class="kpi"><div class="kpi-l">Собів.</div><div class="kpi-v">${avgS}₴/кг</div></div><div class="kpi"><div class="kpi-l">Витрати</div><div class="kpi-v">${Math.round(tCost).toLocaleString('uk')}₴</div></div><div class="kpi"><div class="kpi-l">Оплачено</div><div class="kpi-v">${Math.round(tPay).toLocaleString('uk')}₴</div></div></div>`;

  // Bars
  const items=[['Хімія',tChem,'#3498db'],['ЗП',tWg,'#27ae60'],['ЕЕ',tEe,'#f39c12'],['Вода',tWtr,'#1abc9c'],['Інші',tOth,'#9b59b6']],mx=Math.max(...items.map(x=>x[1]),1);
  h+=`<div class="bar-wrap">`;items.forEach(([n,v,c])=>{const sh=tCost>0?(v/tCost*100).toFixed(1):0;h+=`<div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-bg"><div class="bar-fill" style="width:${(v/mx*100).toFixed(1)}%;background:${c}"></div></div><div class="bar-val">${Math.round(v).toLocaleString('uk')}₴ <span style="color:#aaa;font-size:10px">${sh}%</span></div></div>`});h+=`</div>`;

  // Products
  const pe=Object.entries(prodAgg).sort((a,b)=>(b[1].kg+b[1].rkg)-(a[1].kg+a[1].rkg));
  if(pe.length){h+=`<div class="bar-wrap"><b style="color:#1a3a5c">📦 По виробах</b><table class="tbl" style="margin-top:8px"><thead><tr><th>Виріб</th><th class="r">Покр.</th><th class="r">Перепокр.</th><th class="r">Разом</th><th class="r">Бар.</th></tr></thead><tbody>`;let pk=0,pr=0,pd=0;pe.forEach(([pid,v])=>{const p=s.products.find(x=>x.id===pid);pk+=v.kg;pr+=v.rkg;pd+=v.dr;h+=`<tr><td>${p?.name||pid}</td><td class="r">${v.kg.toFixed(1)}</td><td class="r">${v.rkg?v.rkg.toFixed(1):'—'}</td><td class="r"><b>${(v.kg+v.rkg).toFixed(1)}</b></td><td class="r">${v.dr}</td></tr>`});h+=`<tr class="tot"><td>Разом</td><td class="r">${pk.toFixed(1)}</td><td class="r">${pr.toFixed(1)}</td><td class="r"><b>${(pk+pr).toFixed(1)}</b></td><td class="r">${pd}</td></tr></tbody></table></div>`}

  // Chem by vat
  h+=`<div class="bar-wrap"><b style="color:#1a3a5c">⚗️ Хімія по ваннах</b>`;
  Object.keys(chemByVat).sort().forEach(k=>{const vn=k==='_'?'Без ванни':s.equipment.find(e=>e.id===k)?.name||k;let vt=0;h+=`<div style="font-size:11px;font-weight:600;color:#1a3a5c;margin:6px 0 3px">🛁 ${vn}</div><table class="subtbl"><tbody>`;Object.entries(chemByVat[k]).forEach(([cid,v])=>{const c=s.chem.find(x=>x.id===cid);vt+=v.sum;h+=`<tr><td>${c?.name||cid}</td><td class="r">${v.qty.toFixed(3)}</td><td class="r" style="color:#c0392b">${v.sum.toFixed(2)}₴</td></tr>`});h+=`<tr class="stot"><td>Разом</td><td></td><td class="r" style="color:#c0392b">${vt.toFixed(2)}₴</td></tr></tbody></table>`});h+=`</div>`;

  // Day table with clickable dates and analysis count
  h+=`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>День</th><th class="r">кг</th><th class="r">Хімія</th><th class="r">ЕЕ</th><th class="r">Вода</th><th class="r">ЗП</th><th class="r">Інше</th><th class="r">Разом</th><th class="r">₴/кг</th><th class="r">🔬</th></tr></thead><tbody>`;
  allDays.forEach(dd=>{const kg=(dd.wz||0)+(dd.bz||0),dAna=ana.filter(a=>a.date===dd.date).length;const dp=dd.date.split('-'),dy=+dp[0],dm=+dp[1]-1,dday=+dp[2];
    h+=`<tr><td style="white-space:nowrap"><a href="#" style="color:#1a3a5c" onclick="event.preventDefault();setMonth(${dy},${dm});setTimeout(()=>openDay(${dday}),200)">${dd.date}</a></td><td class="r">${kg}</td><td class="r">${Math.round(dd.chemTotal||0)}</td><td class="r">${(dd.eeCost||0).toFixed(0)}</td><td class="r">${(dd.waterCost||0).toFixed(0)}</td><td class="r">${Math.round(dd.wage||0)}</td><td class="r">${Math.round(dd.other||0)}</td><td class="r">${Math.round(dd.totalCost||0)}</td><td class="r"><b>${dd.seb||0}</b></td><td class="r">${dAna?`<a href="#" style="color:#1a3a5c" onclick="event.preventDefault();openDayAnaModal('${dd.date}')">${dAna}</a>`:''}</td></tr>`});
  h+=`<tr class="tot"><td>Разом</td><td class="r">${tKg}</td><td class="r">${Math.round(tChem)}</td><td class="r">${tEe.toFixed(0)}</td><td class="r">${tWtr.toFixed(0)}</td><td class="r">${Math.round(tWg)}</td><td class="r">${Math.round(tOth)}</td><td class="r">${Math.round(tCost)}</td><td class="r"><b>${avgS}</b></td><td></td></tr></tbody></table></div>`;
  document.getElementById('pg-summary').innerHTML=h}
