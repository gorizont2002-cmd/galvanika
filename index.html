<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Гальваніка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f0f2f5;color:#222}
header{background:#1a3a5c;color:#fff;padding:8px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:300;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.hdr-right button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:12px}
.hdr-right input[type=date]{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 6px;border-radius:4px;font-size:12px}
.hdr-right input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
.hdr-right span{color:rgba(255,255,255,.7);font-size:12px}
.tabs{display:flex;gap:2px;background:#d0d5dd;padding:5px 10px 0;border-bottom:2px solid #1a3a5c;overflow-x:auto}
.tab{padding:6px 12px;border-radius:6px 6px 0 0;cursor:pointer;background:#bfc5d0;font-size:12px;font-weight:500;color:#555;white-space:nowrap;flex-shrink:0}
.tab.active{background:#fff;color:#1a3a5c;border-bottom:2px solid #fff;margin-bottom:-2px}
.pg{padding:10px;display:none}.pg.show{display:block}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;margin-bottom:12px}
.kpi{background:#fff;border:1px solid #dde;border-radius:8px;padding:9px 11px}
.kpi-l{font-size:10px;color:#888;margin-bottom:2px}
.kpi-v{font-size:17px;font-weight:700;color:#1a3a5c}
.kpi-s{font-size:10px;color:#aaa}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px}
.cal-hdr{font-size:10px;font-weight:600;text-align:center;padding:4px 0}
.cal-hdr.we{color:#c0392b}
.dc{background:#fff;border:1px solid #dde;border-radius:7px;padding:6px 7px;cursor:pointer;min-height:78px;transition:border-color .15s;overflow:hidden}
.dc:hover{border-color:#1a3a5c}
.dc.we{background:#fff5f5;border-color:#f5b7b1}
.dc.hd{border-color:#a9cce3;background:#eaf4fb}
.dc.hd.we{background:#fdecea}
.dc.empty{background:transparent;border:none;cursor:default;min-height:0}
.dn{font-size:13px;font-weight:700;color:#1a3a5c}
.dc.we .dn{color:#c0392b}
.ds{font-size:9px;color:#666;margin-top:1px;line-height:1.3}
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;overflow-y:auto;padding:14px;align-items:flex-start;justify-content:center}
.mb.open{display:flex}
.mw{background:#fff;border-radius:10px;width:100%;max-width:760px}
.mw.sm{max-width:500px}
.mh{background:#1a3a5c;color:#fff;padding:10px 14px;display:flex;align-items:center;border-radius:10px 10px 0 0}
.mh h2{font-size:14px;font-weight:600;flex:1}
.mh button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1}
.bd{padding:14px;max-height:75vh;overflow-y:auto}
.mf{padding:9px 14px;border-top:1px solid #eee;display:flex;gap:7px;justify-content:flex-end}
.sec{margin-bottom:13px}
.st{font-size:11px;font-weight:700;color:#1a3a5c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #d0e8f5}
.fg{display:grid;gap:7px;margin-bottom:7px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
label{font-size:11px;color:#555;display:block;margin-bottom:2px}
input,select,textarea{width:100%;padding:5px 7px;border:1px solid #ccc;border-radius:4px;font-size:12px;color:#222;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a3a5c}
.btn{padding:5px 13px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.bp{background:#1a3a5c;color:#fff}.bp:hover{background:#14304d}
.bd2{background:#c0392b;color:#fff}.bd2:hover{background:#a93226}
.bdef{background:#eee;color:#333}.bdef:hover{background:#ddd}
.bsuc{background:#27ae60;color:#fff}.bsuc:hover{background:#219653}
.bwarn{background:#e67e22;color:#fff}
.bsm{padding:3px 8px;font-size:11px}
.badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:600}
.bok{background:#d5f5e3;color:#1e8449}.bwn{background:#fef9e7;color:#b7950b;border:1px solid #f9e79f}
.berr{background:#fadbd8;color:#922b21}.bgr{background:#f0f0f0;color:#666}
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #dde;margin-bottom:12px}
.tbl th{background:#1a3a5c;color:#fff;padding:6px 9px;text-align:left;font-size:11px;white-space:nowrap}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:5px 9px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:middle}
.tbl tr:hover td{background:#f5f8ff}
.tbl .tot td{background:#eaf4fb;font-weight:700;border-top:2px solid #a9cce3}
.tbl .erow td{background:#ffebee}.tbl .wrow td{background:#fff8e1}
.av{font-weight:700}.av.ok{color:#27ae60}.av.warn{color:#e67e22}.av.err{color:#e74c3c}
.prtbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px}
.prtbl th{background:#eaf4fb;padding:4px 6px;font-size:10px;font-weight:700;text-align:left}
.prtbl td{padding:3px 5px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.prtbl td input,.prtbl td select{padding:3px 5px;font-size:11px}
.srchbox{position:relative}.srchbox input{width:100%}
.sdrop{position:absolute;z-index:50;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 5px 5px;max-height:180px;overflow-y:auto;width:100%;display:none}
.sdrop.open{display:block}.sitem{padding:6px 9px;cursor:pointer;font-size:12px}.sitem:hover{background:#eaf4fb}
.chtbl{width:100%;border-collapse:collapse;font-size:12px}
.chtbl th{background:#eaf4fb;padding:4px 6px;font-size:10px;font-weight:700;text-align:left}
.chtbl td{padding:3px 5px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.chtbl td input,.chtbl td select{padding:3px 5px;font-size:11px}
.bar-wrap{background:#fff;border:1px solid #dde;border-radius:8px;padding:12px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-lbl{font-size:11px;width:150px;flex-shrink:0;color:#555;text-align:right}
.bar-bg{flex:1;background:#f0f2f5;border-radius:3px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}.bar-val{font-size:11px;min-width:100px}
.abox{border-radius:6px;padding:8px 11px;margin-bottom:7px;font-size:12px}
.aok{background:#d5f5e3;border:1px solid #a9dfbf}.aw{background:#fff3cd;border:1px solid #ffc107}
.ae{background:#f8d7da;border:1px solid #f5c6cb}
.eqcard{background:#fff;border:1px solid #dde;border-radius:8px;padding:11px;margin-bottom:8px}
.eqh{display:flex;align-items:flex-start;gap:10px}
.eqico{width:34px;height:34px;background:#eaf4fb;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
#syncStatus{position:fixed;bottom:10px;right:10px;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;z-index:999;transition:opacity .5s;opacity:0}
.subtbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
.subtbl td{padding:2px 5px;border-bottom:1px solid #f5f5f5}
.subtbl .stot td{font-weight:700;border-top:1px solid #ccc}
.q-over{background:#d5f5e3;color:#1e8449}.q-under{background:#fadbd8;color:#922b21}.q-exact{background:#eaf4fb;color:#1a3a5c}
.q-badge{display:inline-block;padding:1px 5px;border-radius:8px;font-size:9px;font-weight:700}
</style>
</head>
<body>
<header>
  <h1>⚗️ Гальваніка</h1>
  <div class="hdr-right">
    <button onclick="shiftPeriod(-1)">‹</button>
    <input type="date" id="hdrFrom" onchange="onHdrDateChange()">
    <span>—</span>
    <input type="date" id="hdrTo" onchange="onHdrDateChange()">
    <button onclick="shiftPeriod(1)">›</button>
    <button onclick="setCurrentMonth()" style="font-size:11px">Місяць</button>
  </div>
</header>
<div class="tabs">
  <div class="tab active" data-tab="days">📅 Дні</div>
  <div class="tab" data-tab="queue">📋 Черга</div>
  <div class="tab" data-tab="analysis">🔬 Аналізи</div>
  <div class="tab" data-tab="equipment">🏭 Обладнання</div>
  <div class="tab" data-tab="breakdowns">🔧 Поломки</div>
  <div class="tab" data-tab="payments">💰 Оплати</div>
  <div class="tab" data-tab="products">📦 Товари</div>
  <div class="tab" data-tab="summary">📊 Підсумок</div>
  <div class="tab" data-tab="settings">⚙️ Налаштування</div>
</div>
<div id="pg-days" class="pg show"></div>
<div id="pg-queue" class="pg"></div>
<div id="pg-analysis" class="pg"></div>
<div id="pg-equipment" class="pg"></div>

<div id="pg-payments" class="pg"></div>
<div id="pg-products" class="pg"></div>

<div class="mb" id="mProd"><div class="mw sm"><div class="mh"><h2 id="mProdT"></h2><button onclick="cM('mProd')">×</button></div><div class="bd" id="mProdB"></div><div class="mf"><button class="btn bdef" onclick="cM('mProd')">Скасувати</button><button class="btn bp" onclick="saveProd()">Зберегти</button></div></div></div>

function getCY(){return new Date(gFrom).getFullYear();}
function getCM(){return new Date(gFrom).getMonth();}
function setCurrentMonth(){const n=new Date(),y=n.getFullYear(),m=n.getMonth();gFrom=`${y}-${String(m+1).padStart(2,'0')}-01`;gTo=`${y}-${String(m+1).padStart(2,'0')}-${String(new Date(y,m+1,0).getDate()).padStart(2,'0')}`;syncHdr();refreshTab();}
function setMonth(y,m){gFrom=`${y}-${String(m+1).padStart(2,'0')}-01`;gTo=`${y}-${String(m+1).padStart(2,'0')}-${String(new Date(y,m+1,0).getDate()).padStart(2,'0')}`;syncHdr();refreshTab();}
function shiftPeriod(dir){const f=new Date(gFrom),t=new Date(gTo),diff=Math.round((t-f)/864e5)+1;if(diff>=28&&diff<=31){let y=f.getFullYear(),m=f.getMonth()+dir;if(m>11){m=0;y++;}if(m<0){m=11;y--;}setMonth(y,m);sbGet('galv_month',`${y}_${m}`).then(md=>{if(md)lss(`galv_${y}_${m}`,md);refreshTab();});}else{f.setDate(f.getDate()+dir*diff);t.setDate(t.getDate()+dir*diff);gFrom=isoD(f);gTo=isoD(t);syncHdr();refreshTab();}}
function onHdrDateChange(){gFrom=document.getElementById('hdrFrom').value;gTo=document.getElementById('hdrTo').value;if(gFrom>gTo)gTo=gFrom;refreshTab();}
function syncHdr(){document.getElementById('hdrFrom').value=gFrom;document.getElementById('hdrTo').value=gTo;}
function refreshTab(){const at=document.querySelector('.tab.active');if(at)at.click();}
function isoD(d){return d.toISOString().slice(0,10);}
function periodLabel(){const f=new Date(gFrom),t=new Date(gTo);if(f.getFullYear()===t.getFullYear()&&f.getMonth()===t.getMonth()&&f.getDate()===1&&t.getDate()===new Date(t.getFullYear(),t.getMonth()+1,0).getDate())return MN[f.getMonth()]+' '+f.getFullYear();return gFrom+' — '+gTo;}

// Password
function askPwd(cb){pwdCallback=cb;document.getElementById('pwdInp').value='';oM('mPwd');}
function checkPwd(){if(gv('pwdInp')===PWD){cM('mPwd');if(pwdCallback)pwdCallback();}else alert('Невірний пароль');}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function today(){return new Date().toISOString().slice(0,10)}
function dIM(y,m){return new Date(y,m+1,0).getDate()}
function isWE(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fv(id){return parseFloat(document.getElementById(id)?.value)||0}
function gv(id){return document.getElementById(id)?.value||''}
function oM(id){document.getElementById(id).classList.add('open')}
function cM(id){document.getElementById(id).classList.remove('open')}
function anaStatus(val,type){const v=parseFloat(val);if(isNaN(v))return'none';if(v<type.min||v>type.max)return'err';const r=type.max-type.min;if(v<type.min+r*.1||v>type.max-r*.1)return'warn';return'ok';}
function hasRefs(type,id){const ana=gAna(),bd=gBD(),s=gS();const amd=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.match(/^galv_\d{4}_\d+$/)){try{amd.push(JSON.parse(localStorage.getItem(k)));}catch{}}}if(type==='eq'){if(ana.some(a=>a.vatId===id))return'аналізах';if(bd.some(b=>b.eqId===id))return'поломках';for(const md of amd)for(const d of Object.values(md))if(d&&d.chemRows&&d.chemRows.some(r=>r.vatId===id))return'днях';if(s.anaTypes.some(t=>t.vatId===id))return'типах аналізів';}if(type==='prod'){for(const md of amd)for(const d of Object.values(md))if(d&&d.prodRows&&d.prodRows.some(r=>r.prodId===id))return'днях';if(gQueue().some(q=>q.prodId===id))return'черзі';}if(type==='chem'){for(const md of amd)for(const d of Object.values(md))if(d&&d.chemRows&&d.chemRows.some(r=>r.chemId===id))return'днях';}if(type==='anaType'){if(ana.some(a=>a.typeId===id))return'аналізах';}return false;}
function collectDays(from,to){const dF=new Date(from),dT=new Date(to),all=[];let cur=new Date(dF);while(cur<=dT){const y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate();const md=gMD(y,m),dd=md[d];if(dd&&!dd.weekend)all.push({...dd,date:dStr(y,m,d)});cur.setDate(cur.getDate()+1);}return all;}

// ===== DAYS =====
function renderDays(){
  const f=new Date(gFrom),t=new Date(gTo),y=f.getFullYear(),m=f.getMonth();
  const isFM=f.getDate()===1&&t.getDate()===dIM(y,m)&&t.getMonth()===m;
  if(!isFM){document.getElementById('pg-days').innerHTML=`<div class="abox aw">Календар — тільки для повного місяця. Натисніть «Місяць».</div>`;return;}
  const s=gS(),data=gMD(y,m),days=dIM(y,m),ana=gAna(),queue=gQueue();
  let totKg=0,totCost=0,wDays=0;
  for(let d=1;d<=days;d++){const dd=data[d];if(!dd||dd.weekend)continue;wDays++;totKg+=(dd.wz||0)+(dd.bz||0);totCost+=dd.totalCost||0;}
  const seb=totKg>0?(totCost/totKg).toFixed(2):0;
  const ym=`${y}-${String(m+1).padStart(2,'0')}`;
  const pay=gPay().filter(p=>p.date&&p.date.startsWith(ym));
  const totPay=pay.reduce((a,p)=>a+(parseFloat(p.amount)||0),0);

  const firstDow=new Date(y,m,1).getDay();const startOff=(firstDow===0)?6:firstDow-1;
  let cells='';
  for(let i=0;i<startOff;i++)cells+=`<div class="dc empty"></div>`;
  for(let d=1;d<=days;d++){
    const dd=data[d]||{},dow=new Date(y,m,d).getDay();
    const wknd=dd.weekend!==undefined?dd.weekend:isWE(y,m,d);
    const hasData=dd.wz||dd.bz;const ds=dStr(y,m,d);
    const dayAna=ana.filter(a=>a.date===ds);let anaErr=0,anaWarn=0,anaOk=0;
    dayAna.forEach(a=>{const at=s.anaTypes.find(t=>t.id===a.typeId);if(!at)return;const st=anaStatus(a.value,at);if(st==='err')anaErr++;else if(st==='warn')anaWarn++;else if(st==='ok')anaOk++;});
    const hasBD=gBD().some(b=>b.date===ds);
    const dayQ=queue.filter(q=>q.date===ds);
    let inner=`<div style="display:flex;justify-content:space-between"><span class="dn">${d}</span><span style="font-size:9px;color:#aaa">${DW[dow]}</span></div>`;
    if(hasBD)inner+=`<div class="ds" style="color:#e74c3c">🔧 полом.</div>`;
    if(dayAna.length)inner+=`<div class="ds">🔬${dayAna.length}${anaErr?' <span style="color:#e74c3c">❌'+anaErr+'</span>':''}${anaWarn?' <span style="color:#e67e22">⚠'+anaWarn+'</span>':''}</div>`;
    if(hasData){const kg=(dd.wz||0)+(dd.bz||0);inner+=`<div class="ds"><b>${kg}кг</b> · ${dd.seb||0}грн/кг</div>`;if(dd.chemTotal)inner+=`<div class="ds">💊${Math.round(dd.chemTotal)}грн</div>`;}
    else if(wknd)inner+=`<div class="ds" style="color:#c0392b">Вихідний</div>`;
    else inner+=`<div class="ds" style="color:#bbb">—</div>`;
    if(dayQ.length)inner+=`<div class="ds" style="color:#8e44ad">📋 черга: ${dayQ.length}</div>`;
    cells+=`<div class="dc${wknd?' we':''}${hasData?' hd':''}" onclick="openDay(${d})">${inner}</div>`;
  }
  const lastDow=new Date(y,m,days).getDay();const endOff=(lastDow===0)?0:7-lastDow;
  for(let i=0;i<endOff;i++)cells+=`<div class="dc empty"></div>`;

  document.getElementById('pg-days').innerHTML=`
    <div style="display:flex;gap:7px;margin-bottom:9px"><button class="btn bp" onclick="openEEModal()">⚡ ЕЕ/Вода</button></div>
    <div class="krow">
      <div class="kpi"><div class="kpi-l">Покрито</div><div class="kpi-v">${totKg} кг</div><div class="kpi-s">${wDays} дн.</div></div>
      <div class="kpi"><div class="kpi-l">Собівартість</div><div class="kpi-v">${seb} грн/кг</div></div>
      <div class="kpi"><div class="kpi-l">Витрати</div><div class="kpi-v">${Math.round(totCost).toLocaleString('uk')} грн</div></div>
      <div class="kpi"><div class="kpi-l">Оплачено</div><div class="kpi-v">${Math.round(totPay).toLocaleString('uk')} грн</div></div>
    </div>
    <div class="cal-grid">
      ${['Пн','Вт','Ср','Чт','Пт'].map(n=>`<div class="cal-hdr">${n}</div>`).join('')}
      ${['Сб','Нд'].map(n=>`<div class="cal-hdr we">${n}</div>`).join('')}
      ${cells}
    </div>`;
}

let _pri=0,_cri=0,_selP={};
function openDay(d){
  curDay=d;_selP={};const y=getCY(),m=getCM(),s=gS(),data=gMD(y,m),dd=data[d]||{};
  const wknd=dd.weekend!==undefined?dd.weekend:isWE(y,m,d);
  const ds=dStr(y,m,d);
  const dayAna=gAna().filter(a=>a.date===ds);
  const dayQC=gQC().filter(q=>q.date===ds);
  const dayQ=gQueue().filter(q=>q.date===ds);
  document.getElementById('mDayT').textContent=`${d} ${MN[m]} ${y} (${DW[new Date(y,m,d).getDay()]})`;
  _pri=0;_cri=0;
  const sP=dd.prodRows||[],sC=dd.chemRows||[];
  let pH=sP.map((r,i)=>{_pri=i+1;return bPR(i,r,s);}).join('');
  let cH=sC.map((r,i)=>{_cri=i+1;return bCR(i,r,s);}).join('');
  sP.forEach((r,i)=>{if(r.prodId)_selP[i]=r.prodId;});

  // Queue for this day
  let qH='';
  if(dayQ.length){
    qH=`<div class="sec"><div class="st">📋 Черга на цей день</div><table class="prtbl"><thead><tr><th>Виріб</th><th class="r">Замовлено кг</th><th class="r">Факт кг</th><th>Статус</th></tr></thead><tbody>`;
    dayQ.forEach(q=>{const p=s.products.find(x=>x.id===q.prodId);const factKg=sP.filter(r=>r.prodId===q.prodId).reduce((a,r)=>a+(r.kg||0),0);const diff=factKg-(q.kg||0);const cls=diff>0?'q-over':diff<0?'q-under':'q-exact';qH+=`<tr><td>${p?p.name:q.prodId}</td><td class="r">${q.kg}</td><td class="r">${factKg.toFixed(1)}</td><td><span class="q-badge ${cls}">${diff>0?'+':''}${diff.toFixed(1)}</span></td></tr>`;});
    qH+=`</tbody></table></div>`;
  }

  // Analyses for this day
  let anaH='';
  if(dayAna.length){
    anaH=`<div class="sec"><div class="st">🔬 Аналізи (${dayAna.length})</div>`;
    dayAna.forEach(a=>{const at=s.anaTypes.find(t=>t.id===a.typeId);if(!at)return;const st=anaStatus(a.value,at);const eq=a.vatId?(s.equipment.find(e=>e.id===a.vatId)?.name||''):'';anaH+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:12px"><span class="badge ${st==='ok'?'bok':st==='warn'?'bwn':'berr'}">${a.value} ${at.unit}</span><span>${at.name}</span>${eq?`<span style="color:#888">· ${eq}</span>`:''}</div>`;});
    anaH+=`</div>`;
  }

  // QC for this day
  let qcH='';
  if(dayQC.length){
    qcH=`<div class="sec"><div class="st">✅ Контроль якості (${dayQC.length})</div>`;
    dayQC.forEach(q=>{const p=s.products.find(x=>x.id===q.prodId);qcH+=`<div style="font-size:12px;margin-bottom:3px">📐 ${p?p.name:'—'} · Товщина: <b>${q.thickness||'—'}мкм</b>${q.notes?' · '+q.notes:''}</div>`;});
    qcH+=`</div>`;
  }

  document.getElementById('mDayB').innerHTML=`
    ${qH}${anaH}${qcH}
    <div style="display:flex;gap:5px;margin-bottom:10px">
      <button class="btn bp bsm" onclick="cM('mDay');openAnaModal(null,null,null,'${ds}')">+ Аналіз</button>
      <button class="btn bsuc bsm" onclick="cM('mDay');openQCModal(null,'${ds}')">+ Контроль якості</button>
    </div>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><input type="checkbox" id="isWE" ${wknd?'checked':''} onchange="document.getElementById('wf').style.display=this.checked?'none':''"><label for="isWE" style="font-size:13px;color:#c0392b;font-weight:600">Вихідний / Простій</label></div>
    <div id="wf" ${wknd?'style="display:none"':''}>
      <div class="sec"><div class="st">Час роботи</div><div class="fg g4"><div><label>Початок</label><input type="time" id="tStart" value="${dd.tStart||''}"></div><div><label>Кінець</label><input type="time" id="tEnd" value="${dd.tEnd||''}"></div><div><label>Оператор</label><input type="text" id="operator" value="${dd.operator||''}"></div><div><label>Примітка</label><input type="text" id="dayNote" value="${dd.notes||''}"></div></div></div>
      <div class="sec"><div class="st">Вироби</div><table class="prtbl"><thead><tr><th style="width:35%">Виріб</th><th>Бар.</th><th>кг</th><th>Тип</th><th>Прим.</th><th></th></tr></thead><tbody id="prBody">${pH}</tbody></table><button class="btn bsuc bsm" onclick="addPR()">+ Виріб</button><div style="margin-top:5px;font-size:12px;color:#1a3a5c">Загалом: <b id="totKg">—</b> кг</div></div>
      <div class="sec"><div class="st">Хімія</div><table class="chtbl"><thead><tr><th style="width:35%">Хімікат</th><th style="width:20%">Ванна</th><th>Ціна</th><th>К-ть</th><th>Сума</th><th></th></tr></thead><tbody id="chBody">${cH}</tbody></table><button class="btn bsuc bsm" onclick="addCR()">+ Хімія</button><div style="margin-top:5px;font-size:12px">Разом: <b id="chemTot" style="color:#c0392b">—</b> грн</div></div>
      <div class="sec"><div class="st">ЕЕ, Вода, ЗП</div><div class="fg g4"><div><label>ЕЕ кВт·год</label><input type="number" id="eeKwh" value="${dd.eeKwh||''}" oninput="calcEE()"></div><div><label>Тариф ЕЕ</label><input type="number" id="eeRate" step="0.01" value="${dd.eeRate!==undefined?dd.eeRate:gS().eeRate}" oninput="calcEE()"></div><div><label>Вода м³</label><input type="number" id="wtr" value="${dd.water||''}" oninput="calcEE()"></div><div><label>Тариф вода</label><input type="number" id="wtrRate" step="0.01" value="${dd.waterRate||gS().waterRate}" oninput="calcEE()"></div></div><div style="font-size:12px;color:#555" id="eeDisp"></div><div class="fg g2" style="margin-top:7px"><div><label>ЗП</label><input type="number" id="wage" value="${dd.wage||''}"></div><div><label>Інші витрати</label><input type="number" id="other" value="${dd.other||''}"></div></div></div>
    </div>`;
  oM('mDay');calcPT();calcCT();calcEE();
}
function bPR(i,r,s){const nm=r&&r.prodId?(s.products.find(p=>p.id===r.prodId)||{}).name||'':'';return`<tr id="pr_${i}"><td><div class="srchbox"><input type="text" id="ps_${i}" placeholder="Пошук..." value="${nm}" oninput="fProd(${i})" onfocus="sPD(${i})" autocomplete="off"><div class="sdrop" id="pd_${i}"></div></div></td><td><input type="number" id="pdr_${i}" min="1" value="${r?r.drums:1}" style="width:45px" oninput="oPC(${i})"></td><td><input type="number" id="pkg_${i}" step="0.1" value="${r?r.kg:''}" style="width:50px" oninput="calcPT()"></td><td><select id="pt_${i}" style="font-size:11px;width:70px"><option value="coat" ${!r||!r.recoat?'selected':''}>Покр.</option><option value="recoat" ${r&&r.recoat?'selected':''}>Перепокр.</option></select></td><td><input type="text" id="pn_${i}" value="${r?r.notes||'':''}" style="font-size:11px;width:60px"></td><td><button class="btn bd2 bsm" onclick="document.getElementById('pr_${i}').remove();calcPT()">✕</button></td></tr>`;}
function bCR(i,r,s){const co=s.chem.map(c=>`<option value="${c.id}" ${r&&r.chemId===c.id?'selected':''}>${c.name}</option>`).join('');const eo=['<option value="">—</option>',...s.equipment.map(e=>`<option value="${e.id}" ${r&&r.vatId===e.id?'selected':''}>${e.name}</option>`)].join('');return`<tr id="cr_${i}"><td><select id="cc_${i}" style="font-size:11px" onchange="oCCh(${i})">${co}</select></td><td><select id="cv_${i}" style="font-size:11px">${eo}</select></td><td><input type="number" id="cp_${i}" step="0.01" value="${r?r.price:''}" style="width:60px" oninput="calcCT()"></td><td><input type="number" id="cq_${i}" step="0.01" value="${r?r.qty:''}" style="width:55px" oninput="calcCT()"></td><td style="font-weight:700;color:#c0392b;font-size:11px" id="cs_${i}"></td><td><button class="btn bd2 bsm" onclick="document.getElementById('cr_${i}').remove();calcCT()">✕</button></td></tr>`;}
function addPR(){const i=_pri++;document.getElementById('prBody').insertAdjacentHTML('beforeend',bPR(i,null,gS()));}
function addCR(){const i=_cri++;document.getElementById('chBody').insertAdjacentHTML('beforeend',bCR(i,null,gS()));}
function sPD(i){const s=gS(),d=document.getElementById('pd_'+i);if(!d)return;d.innerHTML=s.products.map(p=>`<div class="sitem" onclick="selP(${i},'${p.id}')">${p.name}</div>`).join('');d.classList.add('open');}
function fProd(i){const s=gS(),q=gv('ps_'+i).toLowerCase(),d=document.getElementById('pd_'+i);if(!d)return;d.innerHTML=s.products.filter(p=>p.name.toLowerCase().includes(q)).map(p=>`<div class="sitem" onclick="selP(${i},'${p.id}')">${p.name}</div>`).join('');d.classList.add('open');}
function selP(i,pid){const s=gS(),p=s.products.find(x=>x.id===pid);_selP[i]=pid;const inp=document.getElementById('ps_'+i);if(inp&&p)inp.value=p.name;const d=document.getElementById('pd_'+i);if(d)d.classList.remove('open');oPC(i);}
function oPC(i){const s=gS(),pid=_selP[i];if(!pid)return;const p=s.products.find(x=>x.id===pid);if(!p||!p.drumLoad)return;const el=document.getElementById('pkg_'+i);if(el)el.value=(p.drumLoad*(fv('pdr_'+i)||1)).toFixed(1);calcPT();}
document.addEventListener('click',e=>{if(!e.target.closest('.srchbox'))document.querySelectorAll('.sdrop').forEach(d=>d.classList.remove('open'));});
function oCCh(i){const s=gS(),c=s.chem.find(x=>x.id===gv('cc_'+i));if(c){const el=document.getElementById('cp_'+i);if(el)el.value=c.price;}calcCT();}
function calcPT(){let t=0;document.querySelectorAll('#prBody tr').forEach(row=>{const i=row.id.replace('pr_','');t+=fv('pkg_'+i)||0;});const el=document.getElementById('totKg');if(el)el.textContent=t.toFixed(1);}
function calcCT(){let t=0;document.querySelectorAll('#chBody tr').forEach(row=>{const i=row.id.replace('cr_',''),p=fv('cp_'+i),q=fv('cq_'+i),s=+(p*q).toFixed(2);const el=document.getElementById('cs_'+i);if(el)el.textContent=q?s.toLocaleString('uk'):'';t+=s;});const el=document.getElementById('chemTot');if(el)el.textContent=t>0?t.toFixed(2):'—';}
function calcEE(){const ee=(fv('eeKwh')*fv('eeRate')).toFixed(2),wc=(fv('wtr')*fv('wtrRate')).toFixed(2);const el=document.getElementById('eeDisp');if(el)el.textContent=`ЕЕ: ${ee} грн | Вода: ${wc} грн`;}
function gPR(){const s=gS(),rows=[];document.querySelectorAll('#prBody tr').forEach(row=>{const i=row.id.replace('pr_','');const pid=_selP[i]||(()=>{const nm=gv('ps_'+i);const p=s.products.find(x=>x.name===nm);return p?p.id:'';})();rows.push({prodId:pid,drums:fv('pdr_'+i),kg:fv('pkg_'+i),recoat:gv('pt_'+i)==='recoat',notes:gv('pn_'+i)});});return rows;}
function gCR(){const rows=[];document.querySelectorAll('#chBody tr').forEach(row=>{const i=row.id.replace('cr_','');rows.push({chemId:gv('cc_'+i),vatId:gv('cv_'+i),price:fv('cp_'+i),qty:fv('cq_'+i)});});return rows;}
async function saveDay(){const y=getCY(),m=getCM();const wknd=document.getElementById('isWE')?.checked;const data=gMD(y,m);if(wknd){data[curDay]={weekend:true};await sMD(y,m,data);cM('mDay');renderDays();return;}const s=gS(),prodRows=gPR(),chemRows=gCR();let wz=0,bz=0,rwz=0,rbz=0;prodRows.forEach(r=>{const p=s.products.find(x=>x.id===r.prodId);const isB=p&&p.coatingType==='black';if(r.recoat){if(isB)rbz+=r.kg;else rwz+=r.kg;}else{if(isB)bz+=r.kg;else wz+=r.kg;}});const chemTotal=chemRows.reduce((a,r)=>a+r.price*r.qty,0);const eeKwh=fv('eeKwh'),eeRate=fv('eeRate')||s.eeRate,eeCost=+(eeKwh*eeRate).toFixed(2);const wtr=fv('wtr'),wtrRate=fv('wtrRate')||s.waterRate,wtrCost=+(wtr*wtrRate).toFixed(2);const wage=fv('wage'),other=fv('other');const totalCost=+chemTotal.toFixed(2)+eeCost+wtrCost+wage+other;const kg=wz+bz+rwz+rbz;const seb=kg>0?+(totalCost/kg).toFixed(2):0;data[curDay]={weekend:false,wz,bz,recoatWz:rwz,recoatBz:rbz,prodRows,chemRows,tStart:gv('tStart'),tEnd:gv('tEnd'),operator:gv('operator'),notes:gv('dayNote'),eeKwh,eeRate,eeCost,water:wtr,waterRate:wtrRate,waterCost:wtrCost,wage,other,chemTotal:+chemTotal.toFixed(2),totalCost,seb};await sMD(y,m,data);cM('mDay');renderDays();}
async function clearDay(){if(!confirm('Очистити?'))return;const y=getCY(),m=getCM(),data=gMD(y,m);delete data[curDay];await sMD(y,m,data);cM('mDay');renderDays();}

// EE Modal
let eeSelDays=new Set();
function openEEModal(){const y=getCY(),m=getCM(),days=dIM(y,m),data=gMD(y,m);eeSelDays=new Set();for(let d=1;d<=days;d++){const dd=data[d];if(!(dd&&dd.weekend!==undefined?dd.weekend:isWE(y,m,d)))eeSelDays.add(d);}renderEEM();oM('mEE');}
function renderEEM(){const s=gS(),y=getCY(),m=getCM(),days=dIM(y,m),data=gMD(y,m);let btns='';for(let d=1;d<=days;d++){const dd=data[d];const wk=dd&&dd.weekend!==undefined?dd.weekend:isWE(y,m,d);if(wk){btns+=`<div style="width:30px;height:30px;border-radius:4px;background:#fff0f0;border:1px solid #f5b7b1;display:flex;align-items:center;justify-content:center;font-size:11px;color:#c0392b">${d}</div>`;continue;}const sel=eeSelDays.has(d);btns+=`<div style="width:30px;height:30px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${sel?'#1a3a5c':'#f0f2f5'};color:${sel?'#fff':'#555'};border:1px solid ${sel?'#1a3a5c':'#dde'}" onclick="toggleED(${d})">${d}</div>`;}document.getElementById('mEEB').innerHTML=`<div class="fg g3"><div><label>ЕЕ початок</label><input type="number" id="eeS"></div><div><label>ЕЕ кінець</label><input type="number" id="eeE"></div><div><label>Тариф ЕЕ</label><input type="number" id="eeT" value="${s.eeRate}" step="0.01"></div></div><div class="fg g3"><div><label>Вода початок</label><input type="number" id="wS"></div><div><label>Вода кінець</label><input type="number" id="wE"></div><div><label>Тариф вода</label><input type="number" id="wT" value="${s.waterRate}" step="0.01"></div></div><div style="font-size:11px;font-weight:600;margin-bottom:5px">Дні (${eeSelDays.size}):</div><div style="display:flex;flex-wrap:wrap;gap:4px">${btns}</div>`;}
function toggleED(d){if(eeSelDays.has(d))eeSelDays.delete(d);else eeSelDays.add(d);renderEEM();}
async function saveEEP(){const n=eeSelDays.size;if(!n)return alert('Виберіть дні');const y=getCY(),m=getCM(),eeTotal=Math.max(0,fv('eeE')-fv('eeS')),wTotal=Math.max(0,fv('wE')-fv('wS')),eeD=+(eeTotal/n).toFixed(4),wD=+(wTotal/n).toFixed(4),eeT=fv('eeT'),wT=fv('wT'),data=gMD(y,m);eeSelDays.forEach(d=>{if(!data[d])data[d]={};if(data[d].weekend)return;data[d].eeKwh=eeD;data[d].eeRate=eeT;data[d].eeCost=+(eeD*eeT).toFixed(2);data[d].water=wD;data[d].waterRate=wT;data[d].waterCost=+(wD*wT).toFixed(2);const dd=data[d];dd.totalCost=(dd.chemTotal||0)+(dd.eeCost||0)+(dd.waterCost||0)+(dd.wage||0)+(dd.other||0);const kg=(dd.wz||0)+(dd.bz||0);dd.seb=kg>0?+(dd.totalCost/kg).toFixed(2):0;});await sMD(y,m,data);cM('mEE');renderDays();}

// ===== QUEUE =====
function renderQueue(){
  const s=gS(),q=gQueue().filter(x=>x.date>=gFrom&&x.date<=gTo).sort((a,b)=>a.date.localeCompare(b.date));
  const allDays=collectDays(gFrom,gTo);
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="font-size:14px;color:#1a3a5c">📋 Черга</h3><button class="btn bp" onclick="openQueueModal(null)">+ Замовлення</button></div>`;
  html+=`<table class="tbl"><thead><tr><th>Дата</th><th>Виріб</th><th class="r">Замовлено кг</th><th class="r">Факт кг</th><th>Різниця</th><th>Примітка</th><th></th></tr></thead><tbody>`;
  if(!q.length)html+=`<tr><td colspan="7" style="text-align:center;color:#aaa;padding:16px">Немає замовлень</td></tr>`;
  q.forEach(qi=>{
    const p=s.products.find(x=>x.id===qi.prodId);
    // Find actual kg for this product on this date
    const dayData=allDays.find(d=>d.date===qi.date);
    const factKg=dayData?(dayData.prodRows||[]).filter(r=>r.prodId===qi.prodId).reduce((a,r)=>a+(r.kg||0),0):0;
    const diff=factKg-(qi.kg||0);const cls=diff>0?'q-over':diff<0?'q-under':'q-exact';
    html+=`<tr><td>${qi.date}</td><td>${p?p.name:qi.prodId}</td><td class="r">${qi.kg}</td><td class="r">${factKg.toFixed(1)}</td><td><span class="q-badge ${cls}">${diff>0?'+':''}${diff.toFixed(1)}</span></td><td style="font-size:11px">${qi.notes||''}</td><td><button class="btn bdef bsm" onclick="openQueueModal('${qi.id}')">✏️</button><button class="btn bd2 bsm" onclick="delQueue('${qi.id}')">✕</button></td></tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('pg-queue').innerHTML=html;
}
function openQueueModal(id){
  editIds.q=id;const q=gQueue(),qi=id?q.find(x=>x.id===id):null;const s=gS();
  document.getElementById('mQT').textContent=id?'Редагувати':'Нове замовлення в чергу';
  const pOpts=s.products.map(p=>`<option value="${p.id}" ${qi?.prodId===p.id?'selected':''}>${p.name}</option>`).join('');
  document.getElementById('mQB').innerHTML=`<div class="fg g3"><div><label>Дата</label><input type="date" id="qD" value="${qi?.date||today()}"></div><div><label>Виріб</label><select id="qP">${pOpts}</select></div><div><label>Кількість (кг)</label><input type="number" id="qKg" step="0.1" value="${qi?.kg||''}"></div></div><div><label>Примітка</label><textarea id="qN" rows="2">${qi?.notes||''}</textarea></div>`;
  oM('mQ');
}
async function saveQueue(){const q=gQueue();const obj={id:editIds.q||uid(),date:gv('qD'),prodId:gv('qP'),kg:fv('qKg'),notes:gv('qN')};if(editIds.q){const i=q.findIndex(x=>x.id===editIds.q);if(i>=0)q[i]=obj;}else q.push(obj);await sQueue(q);cM('mQ');renderQueue();}
async function delQueue(id){if(!confirm('Видалити?'))return;await sQueue(gQueue().filter(x=>x.id!==id));renderQueue();}

async function saveQC(){const qcs=gQC();const obj={id:editIds.qc||uid(),date:gv('qcD'),prodId:gv('qcP'),thickness:fv('qcTh'),notes:gv('qcN')};if(editIds.qc){const i=qcs.findIndex(x=>x.id===editIds.qc);if(i>=0)qcs[i]=obj;}else qcs.push(obj);await sQC(qcs);cM('mQC');renderAnalysis();}

// ===== ANALYSIS =====
function renderAnalysis(){
  const s=gS(),ana=gAna(),qcs=gQC(),now=new Date();now.setHours(0,0,0,0);
  const mAna=ana.filter(a=>a.date&&a.date>=gFrom&&a.date<=gTo);
  const mQC=qcs.filter(q=>q.date&&q.date>=gFrom&&q.date<=gTo);

  let alertsH='';
  s.anaTypes.forEach(at=>{const typed=ana.filter(a=>a.typeId===at.id&&(!at.vatId||a.vatId===at.vatId)).sort((a,b)=>b.date.localeCompare(a.date));const last=typed[0];const vn=at.vatId?(s.equipment.find(e=>e.id===at.vatId)?.name||''):'';const label=at.name+(vn?` (${vn})`:'');if(!last){alertsH+=`<div class="abox ae">⚠️ Ніколи: <b>${label}</b></div>`;return;}const diff=Math.floor((now-new Date(last.date))/864e5);if(diff>=at.freq)alertsH+=`<div class="abox ae">❌ Прострочено ${diff}дн: <b>${label}</b></div>`;else if(diff>=at.freq-1)alertsH+=`<div class="abox aw">🔔 Завтра: <b>${label}</b></div>`;});
  if(!alertsH)alertsH=`<div class="abox aok">✅ Актуально</div>`;

  // Counts
  let cntH=`<div class="bar-wrap"><div style="font-size:12px;font-weight:600;color:#1a3a5c;margin-bottom:8px">Статистика (${periodLabel()})</div>`;
  cntH+=`<table class="tbl"><thead><tr><th>Ванна</th><th class="r">Всього</th><th class="r">✅</th><th class="r">⚠️</th><th class="r">❌</th></tr></thead><tbody>`;
  s.equipment.forEach(eq=>{const va=mAna.filter(a=>a.vatId===eq.id);let ok=0,w=0,er=0;va.forEach(a=>{const at=s.anaTypes.find(t=>t.id===a.typeId);if(!at)return;const st=anaStatus(a.value,at);if(st==='ok')ok++;else if(st==='warn')w++;else if(st==='err')er++;});if(va.length)cntH+=`<tr><td>${eq.name}</td><td class="r">${va.length}</td><td class="r" style="color:#27ae60">${ok}</td><td class="r" style="color:#e67e22">${w}</td><td class="r" style="color:#e74c3c">${er}</td></tr>`;});
  cntH+=`</tbody></table></div>`;

  // QC section
  let qcH=`<div class="bar-wrap"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:12px;font-weight:600;color:#1a3a5c">✅ Контроль якості</div><button class="btn bsuc bsm" onclick="openQCModal(null)">+ Контроль</button></div>`;
  if(mQC.length){
    qcH+=`<table class="tbl"><thead><tr><th>Дата</th><th>Виріб</th><th class="r">Товщина мкм</th><th>Примітка</th><th></th></tr></thead><tbody>`;
    mQC.sort((a,b)=>b.date.localeCompare(a.date)).forEach(q=>{const p=s.products.find(x=>x.id===q.prodId);qcH+=`<tr><td>${q.date}</td><td>${p?p.name:'—'}</td><td class="r"><b>${q.thickness||'—'}</b></td><td style="font-size:11px">${q.notes||''}</td><td><button class="btn bdef bsm" onclick="openQCModal('${q.id}')">✏️</button><button class="btn bd2 bsm" onclick="delQC('${q.id}')">✕</button></td></tr>`;});
    qcH+=`</tbody></table>`;
  }else qcH+=`<div style="color:#aaa;font-size:12px">Немає записів</div>`;
  qcH+=`</div>`;

  // Journal
  const sorted=[...ana].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,80);
  let hist=`<table class="tbl"><thead><tr><th>Дата</th><th>Тип</th><th>Ванна</th><th class="r">Знач.</th><th>Статус</th><th>Прим.</th><th></th></tr></thead><tbody>`;
  sorted.forEach(a=>{const at=s.anaTypes.find(t=>t.id===a.typeId);if(!at)return;const st=anaStatus(a.value,at);const eq=a.vatId?(s.equipment.find(e=>e.id===a.vatId)?.name||''):'';hist+=`<tr class="${st==='err'?'erow':st==='warn'?'wrow':''}"><td>${a.date}</td><td style="font-size:11px">${at.name}</td><td>${eq||'—'}</td><td class="r"><span class="av ${st}">${a.value} ${at.unit}</span></td><td><span class="badge ${st==='ok'?'bok':st==='warn'?'bwn':'berr'}">${st==='ok'?'OK':st==='warn'?'⚠':'❌'}</span></td><td style="font-size:11px;color:#888">${a.notes||''}</td><td><button class="btn bdef bsm" onclick="openAnaModal('${a.id}')">✏️</button><button class="btn bd2 bsm" onclick="delAna('${a.id}')">✕</button></td></tr>`;});
  hist+='</tbody></table>';

  document.getElementById('pg-analysis').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h3 style="font-size:14px;color:#1a3a5c">🔬 Аналізи</h3><button class="btn bp" onclick="openAnaModal(null)">+ Аналіз</button></div>${alertsH}${cntH}${qcH}<div style="font-size:12px;font-weight:600;color:#1a3a5c;margin-bottom:6px">Журнал</div>${hist}`;
}
function openAnaModal(id,preType,preVat,preDate){editIds.ana=id;const s=gS(),ana=gAna(),a=id?ana.find(x=>x.id===id):null;document.getElementById('mAnaT').textContent=id?'Редагувати':'Новий аналіз';const tO=s.anaTypes.map(t=>`<option value="${t.id}" ${(a?.typeId||preType)===t.id?'selected':''}>${t.name} (${t.min}–${t.max})</option>`).join('');const eO=['<option value="">—</option>',...s.equipment.map(e=>`<option value="${e.id}" ${(a?.vatId||preVat)===e.id?'selected':''}>${e.name}</option>`)].join('');document.getElementById('mAnaB').innerHTML=`<div class="fg g2"><div><label>Дата</label><input type="date" id="aD" value="${a?.date||preDate||today()}"></div><div><label>Тип</label><select id="aT" oninput="prevAna()">${tO}</select></div></div><div class="fg g2"><div><label>Ванна</label><select id="aV">${eO}</select></div><div><label>Значення</label><input type="number" id="aVal" step="0.01" value="${a?.value||''}" oninput="prevAna()"></div></div><div id="aPrev" style="margin-bottom:8px"></div><div><label>Примітка</label><textarea id="aN" rows="2">${a?.notes||''}</textarea></div>`;oM('mAna');prevAna();}
function prevAna(){const s=gS(),at=s.anaTypes.find(t=>t.id===gv('aT')),val=gv('aVal');const el=document.getElementById('aPrev');if(!el)return;if(!at||!val){el.innerHTML='';return;}const st=anaStatus(val,at);const bg={ok:'#d5f5e3',warn:'#fef9e7',err:'#fadbd8'}[st]||'';const msg={ok:`✅ Норма (${at.min}–${at.max})`,warn:'⚠️ Межа',err:'❌ Відхил!'}[st]||'';el.innerHTML=msg?`<div style="background:${bg};padding:6px;border-radius:5px;font-size:12px">${msg}</div>`:'';}
async function saveAna(){const ana=gAna();const obj={id:editIds.ana||uid(),date:gv('aD'),typeId:gv('aT'),vatId:gv('aV'),value:gv('aVal'),notes:gv('aN')};if(editIds.ana){const i=ana.findIndex(a=>a.id===editIds.ana);if(i>=0)ana[i]=obj;}else ana.push(obj);await sAna(ana);cM('mAna');renderAnalysis();}
async function delAna(id){if(!confirm('Видалити?'))return;await sAna(gAna().filter(a=>a.id!==id));renderAnalysis();}
async function delQC(id){if(!confirm('Видалити?'))return;await sQC(gQC().filter(x=>x.id!==id));renderAnalysis();}

// ===== SUMMARY (clickable dates) =====
function renderSummary(){
  const s=gS(),allDays=collectDays(gFrom,gTo),pays=gPay().filter(p=>p.date&&p.date>=gFrom&&p.date<=gTo);
  let tWz=0,tBz=0,tWg=0,tEe=0,tWtr=0,tChem=0,tOth=0,tCost=0;const prodAgg={},chemAgg={},chemByVat={};
  allDays.forEach(dd=>{tWz+=dd.wz||0;tBz+=dd.bz||0;tWg+=dd.wage||0;tEe+=dd.eeCost||0;tWtr+=dd.waterCost||0;tChem+=dd.chemTotal||0;tOth+=dd.other||0;tCost+=dd.totalCost||0;(dd.prodRows||[]).forEach(r=>{if(!r.prodId||!r.kg)return;if(!prodAgg[r.prodId])prodAgg[r.prodId]={kg:0,recoatKg:0,drums:0};if(r.recoat)prodAgg[r.prodId].recoatKg+=r.kg;else prodAgg[r.prodId].kg+=r.kg;prodAgg[r.prodId].drums+=(r.drums||1);});(dd.chemRows||[]).forEach(r=>{if(!r.qty)return;if(!chemAgg[r.chemId])chemAgg[r.chemId]={qty:0,sum:0};chemAgg[r.chemId].qty+=r.qty;chemAgg[r.chemId].sum+=r.qty*r.price;const vk=r.vatId||'_none';if(!chemByVat[vk])chemByVat[vk]={};if(!chemByVat[vk][r.chemId])chemByVat[vk][r.chemId]={qty:0,sum:0};chemByVat[vk][r.chemId].qty+=r.qty;chemByVat[vk][r.chemId].sum+=r.qty*r.price;});});
  const tKg=tWz+tBz,avgSeb=tKg>0?(tCost/tKg).toFixed(2):0;const tPay=pays.reduce((a,p)=>a+(parseFloat(p.amount)||0),0),sebPay=tKg>0?(tPay/tKg).toFixed(2):0;

  let html=`<div class="krow"><div class="kpi"><div class="kpi-l">Покрито</div><div class="kpi-v">${tKg} кг</div><div class="kpi-s">${allDays.length} дн.</div></div><div class="kpi"><div class="kpi-l">Білий</div><div class="kpi-v">${tWz}</div></div><div class="kpi"><div class="kpi-l">Чорний</div><div class="kpi-v">${tBz}</div></div><div class="kpi"><div class="kpi-l">Собів.</div><div class="kpi-v">${avgSeb}</div></div><div class="kpi"><div class="kpi-l">Витрати</div><div class="kpi-v">${Math.round(tCost).toLocaleString('uk')}</div></div><div class="kpi"><div class="kpi-l">Оплачено</div><div class="kpi-v">${Math.round(tPay).toLocaleString('uk')}</div></div></div>`;

  // Bars
  const items=[['Хімія',tChem,'#3498db'],['ЗП',tWg,'#27ae60'],['ЕЕ',tEe,'#f39c12'],['Вода',tWtr,'#1abc9c'],['Інші',tOth,'#9b59b6']];const mx=Math.max(...items.map(x=>x[1]),1);
  html+=`<div class="bar-wrap"><div style="font-size:12px;font-weight:600;color:#1a3a5c;margin-bottom:8px">Структура витрат</div>`;items.forEach(([n,v,c])=>{const sh=tCost>0?(v/tCost*100).toFixed(1):0;html+=`<div class="bar-row"><div class="bar-lbl">${n}</div><div class="bar-bg"><div class="bar-fill" style="width:${(v/mx*100).toFixed(1)}%;background:${c}"></div></div><div class="bar-val">${Math.round(v).toLocaleString('uk')} <span style="color:#aaa;font-size:10px">${sh}%</span></div></div>`;});html+=`</div>`;

  // Products
  html+=`<div class="bar-wrap"><div style="font-size:12px;font-weight:600;color:#1a3a5c;margin-bottom:8px">📦 По виробах</div>`;
  const pe=Object.entries(prodAgg).sort((a,b)=>(b[1].kg+b[1].recoatKg)-(a[1].kg+a[1].recoatKg));
  if(pe.length){html+=`<table class="tbl"><thead><tr><th>Виріб</th><th class="r">Покр.кг</th><th class="r">Перепокр.</th><th class="r">Разом</th><th class="r">Бар.</th></tr></thead><tbody>`;let pk=0,pr=0,pd=0;pe.forEach(([pid,v])=>{const p=s.products.find(x=>x.id===pid);const tot=v.kg+v.recoatKg;pk+=v.kg;pr+=v.recoatKg;pd+=v.drums;html+=`<tr><td>${p?p.name:pid}</td><td class="r">${v.kg.toFixed(1)}</td><td class="r">${v.recoatKg?v.recoatKg.toFixed(1):'—'}</td><td class="r"><b>${tot.toFixed(1)}</b></td><td class="r">${v.drums}</td></tr>`;});html+=`<tr class="tot"><td>Разом</td><td class="r">${pk.toFixed(1)}</td><td class="r">${pr.toFixed(1)}</td><td class="r"><b>${(pk+pr).toFixed(1)}</b></td><td class="r">${pd}</td></tr></tbody></table>`;}
  html+=`</div>`;

  // Chem by vat
  html+=`<div class="bar-wrap"><div style="font-size:12px;font-weight:600;color:#1a3a5c;margin-bottom:8px">⚗️ Хімія по ваннах</div>`;
  Object.keys(chemByVat).sort().forEach(k=>{const vn=k==='_none'?'Без ванни':(s.equipment.find(e=>e.id===k)?.name||k);let vt=0;html+=`<div style="font-size:11px;font-weight:600;color:#1a3a5c;margin:6px 0 3px">🛁 ${vn}</div><table class="subtbl"><tbody>`;Object.entries(chemByVat[k]).forEach(([cid,v])=>{const c=s.chem.find(x=>x.id===cid);vt+=v.sum;html+=`<tr><td>${c?c.name:cid}</td><td class="r">${v.qty.toFixed(3)}</td><td class="r" style="color:#c0392b">${v.sum.toFixed(2)}</td></tr>`;});html+=`<tr class="stot"><td>Разом</td><td></td><td class="r" style="color:#c0392b">${vt.toFixed(2)}</td></tr></tbody></table>`;});
  html+=`</div>`;

  // Day table — clickable dates + analysis count
  const ana=gAna();
  html+=`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>День</th><th class="r">кг</th><th class="r">Хімія</th><th class="r">ЕЕ</th><th class="r">Вода</th><th class="r">ЗП</th><th class="r">Інше</th><th class="r">Разом</th><th class="r">грн/кг</th><th class="r">🔬</th></tr></thead><tbody>`;
  allDays.forEach(dd=>{const kg=(dd.wz||0)+(dd.bz||0);const dayAna=ana.filter(a=>a.date===dd.date).length;
    // Parse date to open day modal
    const dp=dd.date.split('-');const dy=parseInt(dp[0]),dm=parseInt(dp[1])-1,dday=parseInt(dp[2]);
    html+=`<tr style="cursor:pointer" onclick="setMonth(${dy},${dm});setTimeout(()=>openDay(${dday}),200)"><td style="color:#1a3a5c;text-decoration:underline">${dd.date}</td><td class="r">${kg}</td><td class="r">${Math.round(dd.chemTotal||0)}</td><td class="r">${(dd.eeCost||0).toFixed(0)}</td><td class="r">${(dd.waterCost||0).toFixed(0)}</td><td class="r">${Math.round(dd.wage||0)}</td><td class="r">${Math.round(dd.other||0)}</td><td class="r">${Math.round(dd.totalCost||0)}</td><td class="r"><b>${dd.seb||0}</b></td><td class="r">${dayAna||''}</td></tr>`;});
  html+=`<tr class="tot"><td>ПІДСУМОК</td><td class="r">${tKg}</td><td class="r">${Math.round(tChem)}</td><td class="r">${tEe.toFixed(0)}</td><td class="r">${tWtr.toFixed(0)}</td><td class="r">${Math.round(tWg)}</td><td class="r">${Math.round(tOth)}</td><td class="r">${Math.round(tCost)}</td><td class="r"><b>${avgSeb}</b></td><td></td></tr></tbody></table></div>`;
  document.getElementById('pg-summary').innerHTML=html;
}

// ===== SETTINGS (password protected) =====
function renderSettings(){const s=gS();let chemR=s.chem.map((c,i)=>`<tr><td><input type="text" value="${c.name}" onchange="updC(${i},'name',this.value)" style="font-size:11px"></td><td><input type="number" step="0.01" value="${c.price}" onchange="updC(${i},'price',parseFloat(this.value))" style="width:70px;font-size:11px"></td><td><input type="text" value="${c.unit||''}" onchange="updC(${i},'unit',this.value)" style="width:40px;font-size:11px"></td><td><button class="btn bd2 bsm" onclick="delC(${i})">✕</button></td></tr>`).join('');document.getElementById('pg-settings').innerHTML=`<div style="background:#fff;border:1px solid #dde;border-radius:8px;padding:13px;margin-bottom:10px"><h3 style="font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:9px">Тарифи</h3><div class="fg g2"><div><label>ЕЕ</label><input type="number" value="${s.eeRate}" step="0.01" onchange="updR('eeRate',this.value)"></div><div><label>Вода</label><input type="number" value="${s.waterRate||0}" step="0.01" onchange="updR('waterRate',this.value)"></div></div></div><div style="background:#fff;border:1px solid #dde;border-radius:8px;padding:13px;margin-bottom:10px"><h3 style="font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:8px">Хімікати</h3><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f5f5f0"><th style="padding:4px 7px;font-size:11px;text-align:left">Назва</th><th style="font-size:11px">Ціна</th><th style="font-size:11px">Од.</th><th></th></tr></thead><tbody id="chemSB">${chemR}</tbody></table></div><button class="btn bsuc bsm" style="margin-top:7px" onclick="addC()">+ Хімікат</button></div><div style="background:#fff;border:1px solid #dde;border-radius:8px;padding:13px"><h3 style="font-size:13px;font-weight:700;color:#1a3a5c;margin-bottom:8px">☁️ Дані</h3><div style="display:flex;gap:7px;flex-wrap:wrap"><button class="btn bp" onclick="askPwd(expAll)">📥 Експорт</button><button class="btn bdef" onclick="askPwd(()=>document.getElementById('impF').click())">📤 Імпорт</button><input type="file" id="impF" accept=".json" style="display:none" onchange="impAll(this)"><button class="btn bd2" onclick="askPwd(()=>{if(confirm('Очистити ВСІ дані?')){localStorage.clear();location.reload();}})">🗑️ Очистити</button></div></div>`;}
async function updC(i,f,v){const s=gS();s.chem[i][f]=v;await sS(s);}
async function delC(i){const s=gS();const ref=hasRefs('chem',s.chem[i].id);if(ref)return alert(`Використовується в ${ref}`);if(!confirm('Видалити?'))return;s.chem.splice(i,1);await sS(s);renderSettings();}
async function addC(){const s=gS();s.chem.push({id:uid(),name:'Новий',price:0,unit:'кг'});await sS(s);renderSettings();}
async function updR(k,v){const s=gS();s[k]=parseFloat(v)||0;await sS(s);}
function expAll(){const all={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('galv_'))all[k]=localStorage.getItem(k);}if(!Object.keys(all).length)return alert('Немає');const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`galvanika_backup.json`;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},200);}
function impAll(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);let n=0;Object.entries(d).forEach(([k,v])=>{if(k.startsWith('galv_')){localStorage.setItem(k,v);n++;}});alert(`Імпортовано ${n}`);location.reload();}catch{alert('Помилка');}};r.readAsText(f);}

// INIT
setCurrentMonth();syncHdr();initFromSB();
</script>
